<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamUP Hotkey Overlay</title>
    <style>
        :root {
            --bg-color: rgba(15, 15, 20, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --accent-color: #00d2ff;
            --glow-color: rgba(0, 210, 255, 0.5);
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            overflow: hidden;
            background: transparent;
            font-family: var(--font-family);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            pointer-events: none;
        }

        #history {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: fit-content;
        }

        .combo-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s cubic-bezier(0.17, 0.67, 0.83, 1) forwards;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .key {
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .separator {
            color: var(--accent-color);
            opacity: 0.8;
        }

        .mouse-action {
            color: var(--accent-color);
            font-style: italic;
        }

        @keyframes slideIn {
            from { transform: translateX(-50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.95); }
        }

        /* Mouse Position Indicator */
        #cursor-glow {
            position: fixed;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, var(--accent-color) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            filter: blur(4px);
            box-shadow: 0 0 15px var(--glow-color);
        }

        #scroll-speed {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 0.9rem;
            color: var(--accent-color);
            background: var(--bg-color);
            padding: 5px 10px;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div id="cursor-glow"></div>
    <div id="scroll-speed">Scroll: 0.0</div>
    <div id="history"></div>

    <script>
        const historyContainer = document.getElementById('history');
        const cursorGlow = document.getElementById('cursor-glow');
        const scrollLabel = document.getElementById('scroll-speed');

        const params = new URLSearchParams(window.location.search);
        const port = params.get('port') || '4455';
        const password = params.get('pwd') || '';

        let socket;
        let clearScrollTimer;

        function connect() {
            socket = new WebSocket(`ws://localhost:${port}`);

            socket.onopen = () => {
                console.log("Connected to OBS WebSocket");
            };

            socket.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                
                // Handle Hello
                if (msg.op === 0) {
                    const identify = {
                        op: 1,
                        d: {
                            rpcVersion: 1,
                            eventSubscriptions: (1 << 12) // Vendors category
                        }
                    };
                    if (msg.d.authentication && password) {
                        // For simplicity in this vanilla demo, we assume no auth or we'd need SHA256
                        // In a real prod environment, we would include a tiny SHA256 helper
                        // However, many local users run without password or we inject it
                    }
                    socket.send(JSON.stringify(identify));
                }

                // Handle Vendor Event
                if (msg.op === 5 && msg.d.eventType === 'VendorEvent') {
                    const data = msg.d.eventData;
                    if (msg.d.vendorName === 'streamup-hotkey-display') {
                        processInput(data);
                    }
                }
            };

            socket.onclose = () => {
                console.log("WebSocket closed, retrying in 2s...");
                setTimeout(connect, 2000);
            };
        }

        function processInput(event) {
            // Handle Keyboard/Click Combos
            if (event.key_combination || (event.mouse && event.mouse.action)) {
                if (event.mouse && event.mouse.action === "Move") {
                    // Just a move update, handled below
                } else {
                    addCombination(event);
                }
            }

            // Handle Mouse Position
            if (event.mouse && event.mouse.x !== undefined) {
                updateCursor(event.mouse.x, event.mouse.y);
            }

            // Handle Scroll Speed
            if (event.mouse && event.mouse.scroll_speed > 0) {
                updateScroll(event.mouse.scroll_speed);
            }
        }

        function addCombination(event) {
            const container = document.createElement('div');
            container.className = 'combo-container';

            const keys = event.key_combination ? event.key_combination.split(' + ') : [];
            const mouseAction = event.mouse ? event.mouse.action : null;

            keys.forEach((k, i) => {
                const keyEl = document.createElement('span');
                keyEl.className = 'key';
                keyEl.textContent = k;
                container.appendChild(keyEl);

                if (i < keys.length - 1 || mouseAction) {
                    const sep = document.createElement('span');
                    sep.className = 'separator';
                    sep.textContent = ' + ';
                    container.appendChild(sep);
                }
            });

            if (mouseAction && mouseAction !== "Move") {
                const mouseEl = document.createElement('span');
                mouseEl.className = 'mouse-action';
                mouseEl.textContent = mouseAction;
                container.appendChild(mouseEl);
            }

            historyContainer.appendChild(container);

            if (historyContainer.children.length > 5) {
                historyContainer.removeChild(historyContainer.children[0]);
            }

            setTimeout(() => {
                container.style.animation = 'fadeOut 0.5s forwards';
                setTimeout(() => {
                    if (container.parentNode) container.remove();
                }, 500);
            }, 3000);
        }

        function updateCursor(x, y) {
            cursorGlow.style.opacity = '1';
            cursorGlow.style.left = `${(x / window.screen.width) * 100}vw`;
            cursorGlow.style.top = `${(y / window.screen.height) * 100}vh`;
            
            clearTimeout(window.cursorTimer);
            window.cursorTimer = setTimeout(() => {
                cursorGlow.style.opacity = '0';
            }, 1000);
        }

        function updateScroll(speed) {
            scrollLabel.style.opacity = '1';
            scrollLabel.textContent = `Scroll: ${speed.toFixed(2)}`;
            
            clearTimeout(clearScrollTimer);
            clearScrollTimer = setTimeout(() => {
                scrollLabel.style.opacity = '0';
            }, 500);
        }

        connect();
    </script>
</body>
</html>
